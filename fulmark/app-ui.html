<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポスター自動生成 | CCG ENTERTAINMENT</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --panel2:#f0f2f5; --line:#e3e6eb;
    --txt:#1a1d24; --muted:#6b7280; --accent:#e0245e; --accent2:#ff5277;
    --ok:#2ecc71; --radius:14px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--txt); -webkit-font-smoothing:antialiased;
  }
  header{
    padding:18px 28px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:14px; background:var(--panel);
  }
  header .logo{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;
  }
  header h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.02em}
  header .sub{font-size:12px;color:var(--muted);margin-top:2px}

  .wrap{max-width:960px;margin:0 auto;padding:32px 24px 80px}

  /* ステップインジケーター */
  .steps{display:flex;gap:8px;margin-bottom:32px}
  .step{
    flex:1;display:flex;align-items:center;gap:10px;padding:12px 14px;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;font-size:13px;color:var(--muted);
  }
  .step .num{
    width:24px;height:24px;border-radius:50%;background:var(--panel2);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;
  }
  .step.active{border-color:var(--accent);color:var(--txt)}
  .step.active .num{background:var(--accent);color:#fff}
  .step.done .num{background:var(--ok);color:#fff}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 1px 3px rgba(16,24,40,.04)}
  .card h2{margin:0 0 6px;font-size:18px}
  .card .desc{color:var(--muted);font-size:13px;margin-bottom:24px}

  label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
  .field{margin-bottom:20px}
  input,textarea,select{
    width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    color:var(--txt);padding:12px 14px;font-size:14px;font-family:inherit;
  }
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
  textarea{resize:vertical;min-height:84px}
  .hint{font-size:11px;color:var(--muted);margin-top:5px}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    padding:8px 14px;border:1px solid var(--line);border-radius:999px;background:var(--panel2);
    font-size:13px;cursor:pointer;user-select:none;transition:.12s;
  }
  .chip:hover{border-color:var(--accent2)}
  .chip.sel{background:var(--accent);border-color:var(--accent);color:#fff}

  .btnrow{display:flex;justify-content:space-between;margin-top:28px;gap:12px}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-size:14px;font-weight:700}
  .btn-primary{background:var(--accent);color:#fff;padding:13px 30px}
  .btn-primary:hover{background:var(--accent2)}
  .btn-primary:disabled{background:var(--panel2);color:var(--muted);cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);padding:13px 22px}
  .btn-ghost:hover{color:var(--txt)}

  /* キャラ選択 */
  .char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
  .char{
    background:var(--panel2);border:2px solid var(--line);border-radius:12px;overflow:hidden;
    cursor:pointer;transition:.12s;position:relative;
  }
  .char:hover{border-color:var(--accent2)}
  .char.sel{border-color:var(--accent)}
  .char .thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:800}
  .char .meta{padding:9px 11px}
  .char .meta .name{font-size:13px;font-weight:700}
  .char .meta .tag{font-size:11px;color:var(--muted);margin-top:2px}
  .char .check{
    position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;
    background:var(--accent);color:#fff;display:none;align-items:center;justify-content:center;font-size:13px;
  }
  .char.sel .check{display:flex}

  /* 生成中 */
  .loading{text-align:center;padding:60px 0}
  .spinner{
    width:54px;height:54px;border:4px solid var(--panel2);border-top-color:var(--accent);
    border-radius:50%;margin:0 auto 22px;animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading .ptext{font-size:15px;font-weight:700}
  .loading .psub{color:var(--muted);font-size:13px;margin-top:6px}
  .bar{height:6px;background:var(--panel2);border-radius:99px;max-width:340px;margin:22px auto 0;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}

  /* 結果 */
  .result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
  .result{
    background:var(--panel2);border:2px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;
    transition:.12s;position:relative;
  }
  .result:hover{border-color:var(--accent2);transform:translateY(-2px)}
  .result.sel{border-color:var(--accent);box-shadow:0 0 0 3px rgba(224,36,94,.25)}
  .result img{width:100%;display:block;aspect-ratio:3/4;object-fit:cover;background:var(--panel2)}
  .result .label{padding:9px 11px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
  .result .badge{
    position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;
  }
  .result .check{
    position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;
    background:var(--accent);color:#fff;display:none;align-items:center;justify-content:center;font-size:14px;
  }
  .result.sel .check{display:flex}

  .summary{
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;
    font-size:12.5px;color:var(--muted);margin-bottom:22px;line-height:1.7;
  }
  .summary b{color:var(--txt);font-weight:600}

  .hidden{display:none}

  /* 拡大モーダル */
  .modal{
    position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;
    z-index:50;padding:30px;
  }
  .modal.open{display:flex}
  .modal img{max-width:90vw;max-height:88vh;border-radius:8px}
  .modal .close{position:absolute;top:20px;right:26px;font-size:30px;color:#fff;cursor:pointer}
</style>
</head>
<body>
<header>
  <div class="logo">P</div>
  <div>
    <h1>パチンコポスター自動生成</h1>
    <div class="sub">CCG ENTERTAINMENT × Wanderlust — PoC prototype</div>
  </div>
</header>

<div class="wrap">

  <!-- ステップ -->
  <div class="steps">
    <div class="step active" id="s1"><span class="num">1</span>プロンプト入力</div>
    <div class="step" id="s2"><span class="num">2</span>キャラクター選択</div>
    <div class="step" id="s3"><span class="num">3</span>生成・選択</div>
  </div>

  <!-- STEP 1 : プロンプト -->
  <section class="card" id="screen1">
    <h2>ポスターの内容を入力</h2>
    <p class="desc">生成したいポスターのテキストと雰囲気を指定してください。</p>

    <div class="field">
      <label>見出し</label>
      <input id="f_title" placeholder="例）新台入替">
    </div>
    <div class="field">
      <label>副見出し</label>
      <input id="f_subtitle" placeholder="例）話題の最新機種、堂々登場">
    </div>
    <div class="field">
      <label>日付</label>
      <input id="f_date" type="text" placeholder="例）4/25(金) GRAND OPEN">
    </div>
    <div class="field">
      <label>ポスターの雰囲気</label>
      <textarea id="f_mood" placeholder="例）高級感のあるゴールド基調、和風で力強い世界観"></textarea>
    </div>

    <div class="btnrow">
      <span></span>
      <button class="btn-primary" onclick="goStep(2)">次へ &rarr;</button>
    </div>
  </section>

  <!-- STEP 2 : キャラ選択 -->
  <section class="card hidden" id="screen2">
    <h2>キャラクターを選択</h2>
    <p class="desc">ポスターに使用するキャラクターを選んでください（複数選択可）。</p>
    <div class="char-grid" id="charGrid"></div>

    <div class="btnrow">
      <button class="btn-ghost" onclick="goStep(1)">&larr; 戻る</button>
      <button class="btn-primary" id="genBtn" onclick="startGenerate()">ポスターを生成 ✦</button>
    </div>
  </section>

  <!-- STEP 3a : 生成中 -->
  <section class="card hidden" id="screenLoading">
    <div class="loading">
      <div class="spinner"></div>
      <div class="ptext">ポスターを生成しています…</div>
      <div class="psub" id="loadingSub">プロンプトとキャラクターを解析中</div>
      <div class="bar"><i id="bar"></i></div>
    </div>
  </section>

  <!-- STEP 3b : 結果 -->
  <section class="card hidden" id="screenResult">
    <h2>生成結果（5パターン）</h2>
    <p class="desc">気に入ったポスターを選択してダウンロードできます。</p>
    <div class="summary" id="resultSummary"></div>
    <div class="result-grid" id="resultGrid"></div>

    <div class="btnrow">
      <div style="display:flex;gap:10px">
        <button class="btn-ghost" onclick="resetAll()">＋ 新しい生成</button>
        <button class="btn-ghost" onclick="regenerate()">↻ 同じ条件で再生成</button>
      </div>
      <button class="btn-primary" id="dlBtn" disabled onclick="downloadSelected()">選択した画像をダウンロード ⬇</button>
    </div>
  </section>

</div>

<!-- 拡大モーダル -->
<div class="modal" id="modal" onclick="this.classList.remove('open')">
  <span class="close">&times;</span>
  <img id="modalImg" src="" alt="">
</div>

<script>
  // ---- キャラクターDB（モック：実際は事前にDBへ格納されたものを表示） ----
  const CHARACTERS = [
    {id:'c1', name:'真島 ユウ',  tag:'女性 / クール',   color:'#3b82f6', emoji:'🗡'},
    {id:'c2', name:'白虎',       tag:'動物 / 力強い',   color:'#f59e0b', emoji:'🐯'},
    {id:'c3', name:'ミライ',     tag:'女性 / ポップ',   color:'#ec4899', emoji:'🎀'},
    {id:'c4', name:'雷神',       tag:'男性 / 和風',     color:'#8b5cf6', emoji:'⚡'},
    {id:'c5', name:'ルナ',       tag:'女性 / ファンシー',color:'#10b981', emoji:'🌙'},
    {id:'c6', name:'鋼',         tag:'ロボ / サイバー', color:'#64748b', emoji:'🤖'},
    {id:'c7', name:'桜花',       tag:'女性 / 和風',     color:'#f43f5e', emoji:'🌸'},
    {id:'c8', name:'ドラコ',     tag:'モンスター / 高級',color:'#eab308', emoji:'🐉'},
  ];

  // 生成結果（モック：実ポスターを流用。実際はAPIで生成した5枚）
  const RESULT_IMAGES = [
    'assets/results/p1.png',
    'assets/results/p2.png',
    'assets/results/p3.png',
    'assets/results/p4.png',
    'assets/results/p1.png',
  ];

  const state = { selectedChars: new Set(), selectedResult: null };

  // ---- キャラグリッド描画 ----
  const grid=document.getElementById('charGrid');
  CHARACTERS.forEach(c=>{
    const el=document.createElement('div');
    el.className='char';
    el.innerHTML=`
      <div class="thumb" style="background:linear-gradient(135deg,${c.color}33,${c.color}11)">${c.emoji}</div>
      <div class="meta"><div class="name">${c.name}</div><div class="tag">${c.tag}</div></div>
      <div class="check">✓</div>`;
    el.addEventListener('click',()=>{
      el.classList.toggle('sel');
      if(el.classList.contains('sel')) state.selectedChars.add(c.id);
      else state.selectedChars.delete(c.id);
      document.getElementById('genBtn').disabled = state.selectedChars.size===0;
    });
    grid.appendChild(el);
  });
  document.getElementById('genBtn').disabled=true;

  // ---- ステップ遷移 ----
  function goStep(n){
    ['screen1','screen2','screenLoading','screenResult'].forEach(id=>document.getElementById(id).classList.add('hidden'));
    document.getElementById('s1').className='step'+(n>1?' done':n===1?' active':'');
    document.getElementById('s2').className='step'+(n>2?' done':n===2?' active':'');
    document.getElementById('s3').className='step'+(n>=3?' active':'');
    if(n===1) document.getElementById('screen1').classList.remove('hidden');
    if(n===2) document.getElementById('screen2').classList.remove('hidden');
    window.scrollTo({top:0,behavior:'smooth'});
  }

  // ---- 生成処理（モック） ----
  function startGenerate(){
    goStep(3);
    document.getElementById('screenLoading').classList.remove('hidden');
    const steps=['プロンプトとキャラクターを解析中','背景と世界観を生成中','テキストレイアウトを調整中','5パターンを仕上げ中'];
    const bar=document.getElementById('bar'); const sub=document.getElementById('loadingSub');
    let i=0; bar.style.width='8%';
    const timer=setInterval(()=>{
      i++;
      if(i<steps.length){ sub.textContent=steps[i]; bar.style.width=(8+i*24)+'%'; }
      else{ bar.style.width='100%'; clearInterval(timer); setTimeout(showResults,500); }
    },900);
  }

  function showResults(){
    document.getElementById('screenLoading').classList.add('hidden');
    document.getElementById('screenResult').classList.remove('hidden');

    // サマリー
    const charNames=CHARACTERS.filter(c=>state.selectedChars.has(c.id)).map(c=>c.name).join('、');
    const g=id=>document.getElementById(id).value||'（未入力）';
    document.getElementById('resultSummary').innerHTML=
      `<b>見出し:</b> ${g('f_title')} ／ <b>副見出し:</b> ${g('f_subtitle')}<br>`+
      `<b>日付:</b> ${g('f_date')} ／ <b>雰囲気:</b> ${g('f_mood')}<br>`+
      `<b>キャラクター:</b> ${charNames||'（未選択）'}`;

    // 結果カード
    const rg=document.getElementById('resultGrid'); rg.innerHTML='';
    RESULT_IMAGES.forEach((src,idx)=>{
      const el=document.createElement('div');
      el.className='result';
      el.innerHTML=`
        <span class="badge">パターン ${idx+1}</span>
        <div class="check">✓</div>
        <img src="${src}" alt="pattern ${idx+1}">
        <div class="label"><span>パターン ${idx+1}</span><span style="color:var(--muted)" onclick="event.stopPropagation();openModal('${src}')">🔍 拡大</span></div>`;
      el.addEventListener('click',()=>{
        document.querySelectorAll('.result').forEach(r=>r.classList.remove('sel'));
        el.classList.add('sel');
        state.selectedResult=src;
        document.getElementById('dlBtn').disabled=false;
      });
      rg.appendChild(el);
    });
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function openModal(src){
    document.getElementById('modalImg').src=src;
    document.getElementById('modal').classList.add('open');
  }

  function downloadSelected(){
    if(!state.selectedResult) return;
    const a=document.createElement('a');
    a.href=state.selectedResult;
    a.download='poster_'+Date.now()+'.png';
    document.body.appendChild(a); a.click(); a.remove();
  }

  // 同じ条件（プロンプト・キャラ）でもう一度生成し直す
  function regenerate(){
    state.selectedResult=null;
    document.getElementById('dlBtn').disabled=true;
    document.getElementById('bar').style.width='0';
    startGenerate();
  }

  function resetAll(){
    state.selectedChars.clear(); state.selectedResult=null;
    document.querySelectorAll('.char.sel').forEach(c=>c.classList.remove('sel'));
    document.getElementById('genBtn').disabled=true;
    document.getElementById('dlBtn').disabled=true;
    document.getElementById('bar').style.width='0';
    goStep(1);
  }
</script>
</body>
</html>
