<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fulmark | CCG ENTERTAINMENT — Wanderlust</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --panel2:#f0f2f5; --line:#e3e6eb;
    --txt:#1a1d24; --muted:#6b7280; --accent:#e0245e; --accent2:#ff5277;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
  header{padding:18px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;background:var(--panel)}
  header .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
  header h1{font-size:16px;margin:0;font-weight:700}
  header .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .wrap{max-width:840px;margin:0 auto;padding:40px 24px 80px}
  .intro{margin-bottom:32px}
  .intro h2{font-size:22px;margin:0 0 10px}
  .intro p{color:var(--muted);font-size:14px;line-height:1.8;margin:0}
  .label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
  .card{display:block;text-decoration:none;color:inherit;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;transition:.14s;box-shadow:0 1px 3px rgba(16,24,40,.04)}
  .card:hover{transform:translateY(-3px);border-color:var(--accent2);box-shadow:0 6px 18px rgba(16,24,40,.08)}
  .card .ico{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,var(--accent)22,var(--accent2)11);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px;background:linear-gradient(135deg,rgba(224,36,94,.12),rgba(255,82,119,.06))}
  .card h3{margin:0 0 6px;font-size:16px}
  .card p{margin:0;font-size:13px;color:var(--muted);line-height:1.7}
  .card .go{margin-top:14px;font-size:13px;font-weight:700;color:var(--accent)}
</style>
</head>
<body>
<header>
  <div class="logo">F</div>
  <div>
    <h1>Fulmark — CCG ENTERTAINMENT</h1>
    <div class="sub">パチンコポスター自動生成プロジェクト × Wanderlust</div>
  </div>
</header>

<div class="wrap">
  <div class="intro">
    <h2>Fulmark プロジェクト</h2>
    <p>パチンコホール向け新台入替ポスターを生成AIで自動／半自動生成するプロジェクトの成果物ページです。</p>
  </div>

  <div class="label">成果物</div>
  <div class="cards">
    <a class="card" href="app-ui.html">
      <div class="ico">🎨</div>
      <h3>簡易アプリケーションUI</h3>
      <p>プロンプト入力 → キャラクター選択 → 5パターン生成・比較・ダウンロードまでの一連の操作フローを試せるUIプロトタイプ。</p>
      <div class="go">開く &rarr;</div>
    </a>
  </div>
</div>
</body>
</html>
